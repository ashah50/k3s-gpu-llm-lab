apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-arch
  labels: {app: hello-arch}
spec:
  replicas: 2
  selector:
    matchLabels: {app: hello-arch}
  template:
    metadata:
      labels: {app: hello-arch}
    spec:
      # spread replicas across nodes so the app visibly runs on BOTH arches
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels: {app: hello-arch}
      containers:
      - name: hello
        image: ghcr.io/REPLACE_OWNER/hello-arch:latest  # set by CI / `make` after first push
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet: {path: /healthz, port: 8080}
        resources:
          requests: {cpu: 10m, memory: 16Mi}
          limits: {memory: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: hello-arch
  labels: {app: hello-arch}
spec:
  selector: {app: hello-arch}
  ports:
  - {port: 80, targetPort: 8080}
