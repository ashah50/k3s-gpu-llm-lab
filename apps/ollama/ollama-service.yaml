apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
  labels: {app: ollama}
spec:
  ports:
  - {name: http, port: 11434, targetPort: 11434, protocol: TCP}
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ollama-1
  namespace: llm
  labels:
    kubernetes.io/service-name: ollama
addressType: IPv4
ports:
- {name: http, port: 11434, protocol: TCP}
endpoints:
- addresses: ["10.0.0.24"]
