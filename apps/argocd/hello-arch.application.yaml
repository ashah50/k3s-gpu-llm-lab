apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-arch
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ashah50/k3s-gpu-llm-lab
    targetRevision: main
    path: apps/hello-arch
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
