apiVersion: apps/v1
kind: Deployment
metadata: { name: polymarket-api, namespace: polymarket, labels: { app: polymarket-api } }
spec:
  replicas: 2
  selector: { matchLabels: { app: polymarket-api } }
  template:
    metadata: { labels: { app: polymarket-api } }
    spec:
      imagePullSecrets: [{ name: ghcr-pull }]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector: { matchLabels: { app: polymarket-api } }
      initContainers:
      - name: wait-pg
        image: postgres:16-alpine
        envFrom: [{ secretRef: { name: polymarket-db } }]
        command: ["sh","-c","until pg_isready -h postgres -U \"$POSTGRES_USER\"; do echo waiting-for-pg; sleep 2; done"]
      containers:
      - name: api
        image: ghcr.io/ashah50/polymarket-api:latest
        envFrom: [{ secretRef: { name: polymarket-db } }]
        ports: [{ containerPort: 8000 }]
        readinessProbe: { httpGet: { path: /healthz, port: 8000 }, initialDelaySeconds: 5, periodSeconds: 10 }
        livenessProbe: { httpGet: { path: /healthz, port: 8000 }, initialDelaySeconds: 15, periodSeconds: 20 }
        resources: { requests: { cpu: 50m, memory: 128Mi }, limits: { memory: 256Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: polymarket-api, namespace: polymarket }
spec:
  selector: { app: polymarket-api }
  ports: [{ port: 80, targetPort: 8000 }]
