apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: polymarket }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgres, namespace: polymarket }
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      nodeSelector: { kubernetes.io/arch: amd64 }
      containers:
      - name: postgres
        image: postgres:16-alpine
        envFrom: [{ secretRef: { name: polymarket-db } }]
        ports: [{ containerPort: 5432 }]
        volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata }]
        readinessProbe: { exec: { command: ["pg_isready","-U","polymarket"] }, initialDelaySeconds: 5, periodSeconds: 5 }
        resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { memory: 1Gi } }
  volumeClaimTemplates:
  - metadata: { name: data }
    spec: { accessModes: ["ReadWriteOnce"], storageClassName: local-path, resources: { requests: { storage: 5Gi } } }
