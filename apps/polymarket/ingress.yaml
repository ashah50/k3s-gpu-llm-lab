apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: polymarket-auth, namespace: polymarket }
spec: { basicAuth: { secret: polymarket-basicauth } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polymarket-api
  namespace: polymarket
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: polymarket-polymarket-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: polymarket.k3s.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend: { service: { name: polymarket-api, port: { number: 80 } } }
