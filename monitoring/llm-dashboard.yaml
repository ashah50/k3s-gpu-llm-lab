# Dashboard-as-code: the kube-prometheus-stack Grafana sidecar auto-loads any
# ConfigMap labeled grafana_dashboard=1. Survives Grafana restarts (no PVC needed)
# and lives in the repo. Datasource bound to the fixed Prometheus uid.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-endpoint-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  llm-endpoint.json: |
    {
      "uid": "llm-endpoint",
      "title": "LLM Endpoint (Ollama)",
      "tags": ["llm", "blackbox"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Endpoint Up",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_success{job=\"ollama-blackbox\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Current Latency",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_duration_seconds{job=\"ollama-blackbox\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 3}, "overrides": []},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "HTTP Status",
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_http_status_code{job=\"ollama-blackbox\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "fieldConfig": {"defaults": {}, "overrides": []},
          "options": {"colorMode": "none", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Probe Latency (response time)",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_duration_seconds{job=\"ollama-blackbox\"}", "legendFormat": "{{instance}}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "fillOpacity": 10}}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Endpoint Availability",
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 15},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_success{job=\"ollama-blackbox\"}", "legendFormat": "{{instance}}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "fieldConfig": {"defaults": {"min": 0, "max": 1, "custom": {"drawStyle": "line", "fillOpacity": 20}}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}
        }
      ]
    }
