apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: ollama-llm
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: ollama-blackbox
  interval: 30s
  module: http_2xx
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter:9115
  targets:
    staticConfig:
      static:
        - http://ollama.llm.svc.cluster.local:11434/api/version
